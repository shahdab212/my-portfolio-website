# Fly.io configuration
# Deploy with: fly launch && fly deploy

app = "rayhan-portfolio"
primary_region = "sin"  # Singapore - change to nearest region

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[env]
  NODE_ENV = "production"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
